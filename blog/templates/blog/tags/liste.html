{% extends 'blog/base.html' %}
{% block titre %}Tags{% endblock %}
{% block contenu %}

<h1 class="mb-4">Tous les tags</h1>

<div class="d-flex flex-wrap gap-2">
    {% for tag in tags %}
    <a href="{{ tag.get_absolute_url }}"
       class="badge text-decoration-none fs-6 bg-secondary">
        #{{ tag.nom }}
    </a>
    {% empty %}
    <p class="text-muted">Aucun tag pour l'instant.</p>
    {% endfor %}
</div>

{% endblock %}
